<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#101820">
    <meta name="description" content="Convert Litomi bookmark exports into Violet JSON arrays.">
    <link rel="icon" href="./assets/litomi-to-violet-logo.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="./assets/litomi-to-violet-logo.svg">
    <link rel="manifest" href="./manifest.webmanifest">
    <title>Litomi to Violet JSON</title>
    <style>
      :root {
        color-scheme: light dark;
        --ink: #101820;
        --muted: #607080;
        --line: #d8e1e8;
        --panel: #ffffff;
        --page: #f5f7f8;
        --page-glow-a: rgba(0, 121, 107, 0.12);
        --page-glow-b: rgba(242, 148, 34, 0.1);
        --field: #fbfcfd;
        --dropzone: #f8fbfc;
        --dropzone-active: #effaf7;
        --button-secondary: #ffffff;
        --button-secondary-hover: #f1f5f7;
        --focus: rgba(0, 121, 107, 0.22);
        --accent: #00796b;
        --accent-dark: #005f54;
        --danger: #b42318;
        --success: #087443;
        --shadow: 0 18px 50px rgba(16, 24, 32, 0.12);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --ink: #edf4f7;
          --muted: #a8b6bf;
          --line: #30434c;
          --panel: #17242b;
          --page: #0d1519;
          --page-glow-a: rgba(0, 150, 136, 0.16);
          --page-glow-b: rgba(242, 148, 34, 0.12);
          --field: #111d23;
          --dropzone: #111d23;
          --dropzone-active: #12302d;
          --button-secondary: #1e2e36;
          --button-secondary-hover: #263943;
          --focus: rgba(42, 184, 166, 0.32);
          --accent: #1f9f8f;
          --accent-dark: #178577;
          --danger: #ffb4ab;
          --success: #77d6a4;
          --shadow: 0 18px 50px rgba(0, 0, 0, 0.34);
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(135deg, var(--page-glow-a), transparent 36%),
          linear-gradient(315deg, var(--page-glow-b), transparent 34%),
          var(--page);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(1040px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0;
      }

      header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 22px;
      }

      .app-logo {
        display: block;
        width: 86px;
        height: 86px;
        margin-bottom: 16px;
        border-radius: 8px;
        box-shadow: var(--shadow);
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 4vw, 4rem);
        line-height: 0.98;
        letter-spacing: 0;
      }

      .tagline {
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 1rem;
        max-width: 620px;
      }

      .shell {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 18px;
        align-items: stretch;
      }

      section {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
        min-width: 0;
        overflow: hidden;
      }

      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 16px 18px;
        border-bottom: 1px solid var(--line);
      }

      h2 {
        margin: 0;
        font-size: 1rem;
      }

      .count {
        color: var(--muted);
        font-size: 0.9rem;
        white-space: nowrap;
      }

      .dropzone {
        display: grid;
        place-items: center;
        min-height: 250px;
        margin: 18px;
        padding: 24px;
        border: 2px dashed var(--line);
        border-radius: 8px;
        background: var(--dropzone);
        text-align: center;
        transition: border-color 160ms ease, background 160ms ease, transform 160ms ease;
      }

      .dropzone.dragging {
        border-color: var(--accent);
        background: var(--dropzone-active);
        transform: translateY(-1px);
      }

      .dropzone strong {
        display: block;
        font-size: 1.2rem;
        margin-bottom: 8px;
      }

      .dropzone span:not(.file-button) {
        display: block;
        color: var(--muted);
        margin-bottom: 18px;
      }

      input[type="file"] {
        position: absolute;
        width: 1px;
        height: 1px;
        opacity: 0;
        pointer-events: none;
      }

      .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      button,
      .file-button {
        appearance: none;
        border: 1px solid transparent;
        border-radius: 7px;
        background: var(--accent);
        color: #fff;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-height: 42px;
        width: min(100%, 320px);
        padding: 0 14px;
        font: inherit;
        font-weight: 700;
        line-height: 1;
        text-decoration: none;
      }

      button:hover,
      .file-button:hover {
        background: var(--accent-dark);
      }

      button.secondary {
        background: var(--button-secondary);
        color: var(--ink);
        border-color: var(--line);
      }

      button.secondary:hover {
        background: var(--button-secondary-hover);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.5;
      }

      textarea {
        display: block;
        width: calc(100% - 36px);
        min-height: 338px;
        margin: 18px;
        resize: vertical;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 14px;
        background: var(--field);
        color: var(--ink);
        font: 0.95rem/1.55 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      textarea:focus,
      button:focus-visible,
      .file-button:focus-visible {
        outline: 3px solid var(--focus);
        outline-offset: 2px;
      }

      .output-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        padding: 0 18px 18px;
      }

      .status {
        min-height: 26px;
        margin: 16px 0 0;
        color: var(--muted);
        font-weight: 650;
      }

      .status.error {
        color: var(--danger);
      }

      .status.success {
        color: var(--success);
      }

      .sample {
        margin: 0 18px 18px;
        color: var(--muted);
        font-size: 0.92rem;
      }

      @media (max-width: 760px) {
        main {
          width: min(100% - 20px, 1040px);
          padding: 18px 0;
        }

        header {
          display: block;
        }

        .app-logo {
          width: 72px;
          height: 72px;
        }

        .shell {
          grid-template-columns: 1fr;
        }

        .dropzone {
          min-height: 210px;
          margin: 12px;
        }

        textarea {
          width: calc(100% - 24px);
          margin: 12px;
          min-height: 260px;
        }

        .section-head,
        .output-actions {
          padding-left: 12px;
          padding-right: 12px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <img class="app-logo" src="./assets/litomi-to-violet-logo.svg" alt="Litomi to Violet">
          <h1>Litomi to Violet JSON</h1>
          <p class="tagline">Upload a Litomi bookmark export and get a Violet-compatible JSON array of manga ID strings.</p>
        </div>
      </header>

      <div class="shell">
        <section aria-labelledby="input-title">
          <div class="section-head">
            <h2 id="input-title">Import</h2>
            <span class="count" id="fileName">No file selected</span>
          </div>

          <label class="dropzone" id="dropzone" for="fileInput">
            <span>
              <strong>Drop your JSON file here</strong>
              <span>or choose a Litomi export from your device</span>
              <span class="file-button" role="button" tabindex="0">Choose JSON</span>
            </span>
          </label>
          <input id="fileInput" type="file" accept=".json,application/json">
          <p class="sample">Expected input: an object with a <code>bookmarks</code> array containing <code>mangaId</code> values.</p>
        </section>

        <section aria-labelledby="output-title">
          <div class="section-head">
            <h2 id="output-title">Output</h2>
            <span class="count" id="bookmarkCount">0 IDs</span>
          </div>

          <textarea id="output" spellcheck="false" readonly placeholder="Your converted JSON will appear here."></textarea>
          <div class="output-actions">
            <button id="copyButton" type="button" disabled>Copy to clipboard</button>
            <button id="downloadButton" type="button" class="secondary" disabled>Download JSON</button>
            <button id="clearButton" type="button" class="secondary">Clear</button>
          </div>
        </section>
      </div>

      <p class="status" id="status" role="status" aria-live="polite"></p>
    </main>

    <script>
      const fileInput = document.querySelector("#fileInput");
      const dropzone = document.querySelector("#dropzone");
      const output = document.querySelector("#output");
      const statusLine = document.querySelector("#status");
      const bookmarkCount = document.querySelector("#bookmarkCount");
      const fileName = document.querySelector("#fileName");
      const copyButton = document.querySelector("#copyButton");
      const downloadButton = document.querySelector("#downloadButton");
      const clearButton = document.querySelector("#clearButton");

      let currentJson = "";

      function setStatus(message, type = "") {
        statusLine.textContent = message;
        statusLine.className = `status ${type}`.trim();
      }

      function setOutput(ids) {
        currentJson = JSON.stringify(ids, null, 2);
        output.value = currentJson;
        bookmarkCount.textContent = `${ids.length} ${ids.length === 1 ? "ID" : "IDs"}`;
        copyButton.disabled = ids.length === 0;
        downloadButton.disabled = ids.length === 0;
      }

      function clearAll() {
        currentJson = "";
        output.value = "";
        fileInput.value = "";
        fileName.textContent = "No file selected";
        bookmarkCount.textContent = "0 IDs";
        copyButton.disabled = true;
        downloadButton.disabled = true;
        setStatus("");
      }

      function convertLitomiJson(text) {
        const parsed = JSON.parse(text);

        if (!parsed || !Array.isArray(parsed.bookmarks)) {
          throw new Error("The JSON must contain a bookmarks array.");
        }

        return parsed.bookmarks.map((bookmark, index) => {
          if (!bookmark || bookmark.mangaId === undefined || bookmark.mangaId === null) {
            throw new Error(`Bookmark at position ${index + 1} is missing mangaId.`);
          }

          return String(bookmark.mangaId);
        });
      }

      async function handleFile(file) {
        if (!file) return;

        try {
          fileName.textContent = file.name;
          const text = await file.text();
          const ids = convertLitomiJson(text);
          setOutput(ids);
          setStatus(`Converted ${ids.length} bookmark ${ids.length === 1 ? "ID" : "IDs"}.`, "success");
        } catch (error) {
          setOutput([]);
          setStatus(error instanceof SyntaxError ? "That file is not valid JSON." : error.message, "error");
        }
      }

      async function copyToClipboard(text) {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
          return;
        }

        output.removeAttribute("readonly");
        output.select();
        output.setSelectionRange(0, output.value.length);
        document.execCommand("copy");
        output.setAttribute("readonly", "");
        window.getSelection().removeAllRanges();
      }

      fileInput.addEventListener("change", () => {
        handleFile(fileInput.files[0]);
      });

      dropzone.addEventListener("dragover", (event) => {
        event.preventDefault();
        dropzone.classList.add("dragging");
      });

      dropzone.addEventListener("dragleave", () => {
        dropzone.classList.remove("dragging");
      });

      dropzone.addEventListener("drop", (event) => {
        event.preventDefault();
        dropzone.classList.remove("dragging");
        handleFile(event.dataTransfer.files[0]);
      });

      copyButton.addEventListener("click", async () => {
        try {
          await copyToClipboard(currentJson);
          setStatus("Copied converted JSON to clipboard.", "success");
        } catch (error) {
          setStatus("Could not copy automatically. Select the output text and copy it manually.", "error");
        }
      });

      downloadButton.addEventListener("click", () => {
        const blob = new Blob([currentJson], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "violet-bookmarks.json";
        link.click();
        URL.revokeObjectURL(url);
      });

      clearButton.addEventListener("click", clearAll);

      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js");
        });
      }
    </script>
  </body>
</html>
